name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

  lint:
    name: Lint & Format
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm lint

      - name: Enforce frontend DB isolation
        run: |
          if grep -q '@taskforge/db' apps/web/package.json; then
            echo "::error::apps/web must not depend on @taskforge/db — all data access goes through the API"
            exit 1
          fi

  typecheck:
    name: Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm turbo build

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm test

  audit:
    name: Dependency Audit
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

  bundle-size:
    name: Bundle Size Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build web app
        run: pnpm --filter @taskforge/web build

      - name: Check bundle size
        run: |
          if [ ! -d "apps/web/dist/assets" ]; then
            echo "No web dist/assets found — skipping bundle size check"
            exit 0
          fi

          BUNDLE_SIZE=$(find apps/web/dist/assets -name '*.js' -exec gzip -c {} \; | wc -c)
          BUNDLE_KB=$((BUNDLE_SIZE / 1024))
          echo "Gzipped JS bundle size: ${BUNDLE_KB}KB (${BUNDLE_SIZE} bytes)"

          if [ "$BUNDLE_SIZE" -gt 524288 ]; then
            echo "::error::Bundle size ${BUNDLE_KB}KB exceeds 500KB limit"
            exit 1
          fi

          if [ "$BUNDLE_SIZE" -gt 262144 ]; then
            echo "::warning::Bundle size ${BUNDLE_KB}KB exceeds 250KB warning threshold"
          fi
